services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flightplan
      POSTGRES_PASSWORD: flightplan_local
      POSTGRES_DB: flightplan
    ports:
      - "5432:5432"
    volumes:
      - flightplan_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightplan -d flightplan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  flightplan_pg_data:
